defaults:
  - _self_
dataset:
  dataroot: ../data
  part: 1
  nidentities: 400
  imagesperidentity: 40
  candidatesperidentity: 80
  nforget: 40
  ntest: 60
  seed: 42
pipeline:
  ctxid: 0
  imgsize: 128
  confthreshold: 0.85
  blurthreshold: 80.0
  min_similarity_raw: 0.40
  min_similarity_final: 0.45
  generatorcmd: >-
    python instantid_adapter.py --idimage {idimage} --outputpath {outputpath}
    --seed {generationseed} --prompt "{prompt}" --width 1024 --height 1024
    --numinferencesteps 30 --guidancescale 5.0
steps:
  download: false
  generate: true
  preprocess: true
  extract: true
  build: true
