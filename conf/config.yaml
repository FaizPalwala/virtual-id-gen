defaults:
  - _self_
dataset:
  dataroot: ../data
  part: 1
  nidentities: 400
  imagesperidentity: 40
  candidatesperidentity: 60
  nforget: 40
  ntest: 60
  seed: 42
pipeline:
  ctxid: 0
  imgsize: 128
  confthreshold: 0.85
  blurthreshold: 80.0
  min_similarity_raw: 0.40
  min_similarity_final: 0.45
  instantid:
    base_model: stabilityai/stable-diffusion-xl-base-1.0
    width: 1024
    height: 1024
    num_inference_steps: 35
    guidance_scale: 5.5
    ip_adapter_scale: 0.90
    controlnet_conditioning_scale: 0.80
    cache_dir: null
    require_cuda: true

steps:
  download: false
  generate: true
  preprocess: true
  extract: true
  build: true
